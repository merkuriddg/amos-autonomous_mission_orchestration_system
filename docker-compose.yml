version: '3.8'
services:
  mos:
    build: .
    container_name: mos-core
    network_mode: host
    privileged: true
    volumes:
      - ./src/mos_core/config:/mos_ws/src/mos_core/config
      - /dev:/dev
    environment:
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    ports:
      - "5000:5000"
      - "6969:6969/udp"
    restart: unless-stopped

  # Optional: PX4 SITL for testing
  px4-sitl:
    image: px4io/px4-dev-simulation-focal:latest
    container_name: px4-sitl
    network_mode: host
    environment:
      - PX4_SIM_MODEL=iris
    command: make px4_sitl gazebo
    profiles: ["sitl"]
