name: ros2_adapter
version: "1.0"
type: transport
description: >
  ROS 2 bridge adapter — publishes AMOS asset/threat state to ROS 2
  topics and ingests telemetry from external robotic nodes.
author: Merkuri DG
license: MIT
entry_point: ROS2AdapterPlugin
requires:
  - integrations.ros2_integration
capabilities:
  - ros2_publish
  - ros2_subscribe
  - telemetry_ingest
  - health
config:
  node_name: "amos_bridge"
  sync_interval_sec: 1.0
