name: AMOS Core CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'web/enterprise/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'web/enterprise/**'
      - 'docs/**'
      - '*.md'

env:
  AMOS_EDITION: open
  AMOS_ENV: dev

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check web/ core/ services/ tests/ --select E,F,W --ignore E501

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest>=8.0 pytest-cov>=5.0 ruff

      - name: Run tests (core edition)
        env:
          AMOS_EDITION: open
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=web --cov=core --cov=services \
            --cov-report=term-missing \
            --cov-fail-under=50

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: htmlcov/
