version: '3.8'

services:
  mos:
    build: .
    container_name: mos-c2
    ports:
      - "5000:5000"
      - "6969:6969/udp"   # ATAK CoT
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-mos-prod-key-2026}
    volumes:
      - mos-data:/opt/mos/data
      - ./config:/opt/mos/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mos-data:
