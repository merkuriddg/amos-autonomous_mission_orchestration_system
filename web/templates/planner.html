{% extends "base.html" %}
{% block title %}Mission Planner{% endblock %}
{% block head %}<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>{% endblock %}
{% block content %}
<div style="max-width:1200px;margin:0 auto">
 <h2 style="font-size:1em;margin-bottom:10px;border-bottom:1px solid #222;padding-bottom:6px">MISSION PLANNER</h2>
 <div class="grid-2">
    <div class="card"><h3>SWARM PLANNER</h3>
        <input id="sw-id" placeholder="Swarm ID (e.g. ALPHA)" style="background:#0a0a0a;color:#00ff41;border:1px solid #333;padding:6px;width:100%;margin:4px 0;font-family:inherit">
        <select id="sw-form" style="background:#0a0a0a;color:#00ff41;border:1px solid #333;padding:6px;width:100%;margin:4px 0;font-family:inherit">
            <option value="line">Line</option><option value="wedge">Wedge</option>
            <option value="column">Column</option><option value="diamond">Diamond</option><option value="orbit">Orbit</option>
        </select>
        <div id="sw-assets" style="margin:8px 0"></div>
        <button class="btn" onclick="createSwarm()" style="width:100%">CREATE SWARM</button>
    </div>
    <div class="card"><h3>ACTIVE SWARMS</h3><div class="scroll-box" id="swarm-list"></div></div>
 </div>
 <div class="card" style="margin-top:8px"><h3>FORMATION PREVIEW</h3>
  <div id="plan-map" style="height:360px;background:#0a0a0a;border:1px solid #222"></div>
 </div>
</div>
{% endblock %}
{% block scripts %}
<script>
var planMap=L.map('plan-map',{zoomControl:false}).setView([_amosTheater.lat,_amosTheater.lng],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(planMap);
var planLayer=L.layerGroup().addTo(planMap);
// ── Planner with checkbox persistence ──
var _checkedAssets = new Set();

async function refreshPlanner(){
    document.querySelectorAll('.asset-cb:checked').forEach(function(cb){
        _checkedAssets.add(cb.value);
    });
    var assets = await apiFetch('/api/v1/assets');
    var div = document.getElementById('sw-assets');
    div.innerHTML = '<div style="color:#888;margin-bottom:4px">Select assets:</div>';
    for(var id of Object.keys(assets)){
        var checked = _checkedAssets.has(id) ? ' checked' : '';
        div.innerHTML += '<label style="display:inline-block;margin:2px 8px">' +
            '<input type="checkbox" class="asset-cb" value="' + id + '"' + checked + '> ' +
            id + '</label>';
    }
    var swarms = await apiFetch('/api/v1/swarm');
    var list = document.getElementById('swarm-list');
    list.innerHTML = '';
    planLayer.clearLayers();
    var dc={air:'#00aaff',ground:'#00ff41',maritime:'#ff44ff'};
    for(var[sid, s] of Object.entries(swarms)){
        list.innerHTML += '<div style="border:1px solid #00ff41;padding:8px;margin:4px 0">' +
            '<strong>' + sid + '</strong> — ' +
            (s.formation || 'none') + ' (' + (s.assets ? s.assets.length : 0) + ' assets)</div>';
        var pts=[];
        (s.assets||[]).forEach(function(aid){
            var a=assets[aid];
            if(!a)return;
            pts.push([a.position.lat,a.position.lng]);
            L.circleMarker([a.position.lat,a.position.lng],{radius:5,color:dc[a.domain]||'#888',fillColor:dc[a.domain]||'#888',fillOpacity:.9}).addTo(planLayer)
             .bindTooltip(aid,{permanent:true,className:'dark-tooltip',direction:'right',offset:[6,0]});
        });
        if(pts.length>1){
            if(s.formation==='orbit'){
                var cLat=pts.reduce(function(s,p){return s+p[0];},0)/pts.length;
                var cLng=pts.reduce(function(s,p){return s+p[1];},0)/pts.length;
                L.circle([cLat,cLng],{radius:3000,color:'#00ff41',fillOpacity:0,weight:1,dashArray:'6 4'}).addTo(planLayer);
            } else {
                L.polyline(pts,{color:'#00ff41',weight:1,dashArray:'6 4'}).addTo(planLayer);
            }
        }
    }
    planMap.invalidateSize();
}

async function createSwarm(){
    var id = document.getElementById('sw-id').value;
    var form = document.getElementById('sw-form').value;
    var cbs = document.querySelectorAll('.asset-cb:checked');
    var assets = Array.from(cbs).map(function(c){ return c.value; });
    if(!id || assets.length === 0){ alert('Need swarm ID and assets'); return; }
    await apiPost('/api/v1/swarm/create', {swarm_id: id, assets: assets, formation: form});
    refreshPlanner();
}

document.addEventListener('change', function(e){
    if(e.target && e.target.classList.contains('asset-cb')){
        if(e.target.checked){
            _checkedAssets.add(e.target.value);
        } else {
            _checkedAssets.delete(e.target.value);
        }
    }
}, true);

refreshPlanner();
setInterval(refreshPlanner, 5000);
</script>
{% endblock %}
