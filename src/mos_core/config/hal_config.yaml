# MOS Hardware Abstraction Layer Configuration
# Each asset can be: sim | mavlink | nav2 | manual
# Change source to switch between simulated and real hardware

hal:
  default_source: sim    # sim | mavlink | nav2

  # MAVLink connection profiles
  mavlink_profiles:
    default:
      connection: "udp://:14540@127.0.0.1:14557"
      baudrate: 921600
      system_id: 1
      component_id: 1
      source_system: 255
      source_component: 0
      target_system: 1
      target_component: 1

    serial:
      connection: "serial:///dev/ttyUSB0:921600"
      system_id: 1
      component_id: 1

    multi_vehicle:
      # For SITL multi-vehicle: each on different port
      base_port: 14540
      port_increment: 10

  # Nav2 connection profiles
  nav2_profiles:
    default:
      namespace: ""
      map_frame: "map"
      robot_frame: "base_link"

  # Asset-to-hardware mapping
  # Override default_source per asset
  asset_map:
    # Example: connect MVRX-A01 to a real PX4 drone
    # MVRX-A01:
    #   source: mavlink
    #   connection: "udp://:14540@127.0.0.1:14557"
    #   armed_on_start: false
    #
    # Example: connect MVRX-G01 to a real Nav2 robot
    # MVRX-G01:
    #   source: nav2
    #   namespace: "/robot1"

  # Safety limits for real hardware
  safety:
    max_altitude_m: 120          # FAA Part 107
    max_speed_mps: 20            # ~45 mph
    max_range_from_base_m: 2000  # 2km tether
    geofence_enforce: true       # Hard geofence on real hardware
    require_arm_confirmation: true
    require_mission_confirmation: true
    auto_rtl_battery_pct: 25     # Force RTL at 25%
    kill_switch_topic: "/mos/emergency_stop"

  # DDIL (Denied, Disrupted, Intermittent, Limited) settings
  ddil:
    enable_local_cache: true
    heartbeat_timeout_s: 5.0
    auto_hold_on_disconnect: true
    store_and_forward: true
    mesh_fallback: true
