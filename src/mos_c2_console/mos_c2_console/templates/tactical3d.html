<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOS - 3D Tactical View</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a0a;color:#00ff88;overflow:hidden}
#header{background:#0d1117;padding:10px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid #00ffff44;position:relative;z-index:100}
#header h1{font-size:16px;letter-spacing:3px}
#header h1 span{color:#00ffff}
.nav-links{display:flex;gap:10px;align-items:center}
.nav-links a{color:#4488ff;text-decoration:none;font-size:11px;border:1px solid #4488ff44;
  padding:4px 10px;border-radius:3px}
.nav-links a:hover{background:#4488ff22}
#viewer-wrap{width:100%;height:calc(100vh - 48px);position:relative}
#cesiumContainer{width:100%;height:100%}
#token-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:#0a0a0aee;
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
#token-overlay h2{color:#00ffff;margin-bottom:16px;font-size:18px}
#token-overlay p{color:#888;font-size:12px;margin-bottom:16px;max-width:400px;text-align:center}
#token-overlay input{background:#1a1a2e;border:1px solid #00ffff44;color:#00ff88;padding:8px 16px;
  font-family:'Courier New',monospace;font-size:12px;width:360px;border-radius:4px;text-align:center}
#token-overlay button{margin-top:12px;background:#00ffff22;color:#00ffff;border:1px solid #00ffff;
  padding:8px 24px;cursor:pointer;border-radius:4px;font-family:'Courier New',monospace}
#token-overlay a{color:#4488ff;font-size:11px;margin-top:12px}
#legend{position:absolute;bottom:40px;left:20px;background:#0d1117dd;padding:10px 16px;
  border-radius:6px;border:1px solid #00ffff22;z-index:100;font-size:10px}
.leg-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.leg-dot{width:10px;height:10px;border-radius:50%}
#stats3d{position:absolute;top:10px;right:20px;background:#0d1117dd;padding:10px 16px;
  border-radius:6px;border:1px solid #00ffff22;z-index:100;font-size:11px}
</style>
</head>
<body>
<div id="header">
  <h1>&#x25C8; <span>MOS</span> 3D TACTICAL</h1>
  <div class="nav-links">
    <a href="/">C2 CONSOLE</a><a href="/ew" style="color:#ff0066">⚡EW</a>
    <a href="/sigint">📡SIGINT</a>
    <a href="/cyber">🔓CYBER</a>
    <a href="/dashboard">TWIN</a><a href="/aar">AAR</a><a href="/echelon">ECHELON</a>
  </div>
</div>
<div id="viewer-wrap">
  <div id="token-overlay">
    <h2>&#x1F310; CESIUM ION TOKEN REQUIRED</h2>
    <p>Get a free token at cesium.com/ion/tokens (takes 30 seconds). Paste it below to enable 3D terrain and imagery.</p>
    <input id="token-input" placeholder="Paste your Cesium Ion access token here"/>
    <button onclick="saveToken()">ACTIVATE 3D VIEW</button>
    <a href="https://cesium.com/ion/tokens" target="_blank">&#x2192; Get Free Token</a>
  </div>
  <div id="cesiumContainer"></div>
  <div id="legend" style="display:none">
    <div class="leg-row"><div class="leg-dot" style="background:#4488ff"></div> AIR</div>
    <div class="leg-row"><div class="leg-dot" style="background:#44ff44"></div> GROUND</div>
    <div class="leg-row"><div class="leg-dot" style="background:#ff8844"></div> MARITIME</div>
    <div class="leg-row"><div class="leg-dot" style="background:#ff4444"></div> THREAT</div>
  </div>
  <div id="stats3d" style="display:none"></div>
</div>
<script>
var DC={AIR:Cesium.Color.fromCssColorString('#4488ff'),
        GROUND:Cesium.Color.fromCssColorString('#44ff44'),
        MARITIME:Cesium.Color.fromCssColorString('#ff8844')};
var viewer=null, entities={}, trails={};

function saveToken(){
  var t=document.getElementById('token-input').value.trim();
  if(t){localStorage.setItem('cesium_token',t);initViewer(t);}
}
function initViewer(token){
  Cesium.Ion.defaultAccessToken=token;
  document.getElementById('token-overlay').style.display='none';
  document.getElementById('legend').style.display='block';
  document.getElementById('stats3d').style.display='block';
  try{
    viewer=new Cesium.Viewer('cesiumContainer',{
      terrain:Cesium.Terrain.fromWorldTerrain(),
      baseLayerPicker:false,timeline:false,animation:false,
      homeButton:false,geocoder:false,navigationHelpButton:false,
      sceneModePicker:true,fullscreenButton:false,
      baseLayer:Cesium.ImageryLayer.fromProviderAsync(
        Cesium.IonImageryProvider.fromAssetId(3))
    });
    viewer.scene.globe.enableLighting=true;
    viewer.camera.flyTo({
      destination:Cesium.Cartesian3.fromDegrees(-82.5212,27.8497,8000),
      orientation:{heading:Cesium.Math.toRadians(0),pitch:Cesium.Math.toRadians(-45),roll:0},
      duration:2
    });
    setInterval(refresh,1500);
    refresh();
  }catch(e){
    document.getElementById('cesiumContainer').innerHTML=
      '<div style="color:#ff4444;padding:40px;text-align:center">Error initializing Cesium: '+e.message+'<br>Check your token.</div>';
  }
}
function refresh(){
  if(!viewer) return;
  fetch('/api/assets').then(function(r){return r.json()}).then(function(assets){
    var ac=0;
    assets.forEach(function(a){
      var id=a.asset_id;
      var alt=a.alt*0.3048+50;
      var pos=Cesium.Cartesian3.fromDegrees(a.lon,a.lat,a.asset_type==='AIR'?alt:10);
      var color=DC[a.asset_type]||Cesium.Color.WHITE;
      var active=a.mission_status>0&&a.mission_status<5;
      if(active) ac++;
      if(entities[id]){
        entities[id].position=pos;
        entities[id].label.text=a.callsign+'\n'+a.battery.toFixed(0)+'%';
      }else{
        entities[id]=viewer.entities.add({
          position:pos,
          point:{pixelSize:a.asset_type==='AIR'?10:8,color:color,
                 outlineColor:Cesium.Color.WHITE,outlineWidth:1},
          label:{text:a.callsign+'\n'+a.battery.toFixed(0)+'%',font:'11px monospace',
                 fillColor:color,style:Cesium.LabelStyle.FILL_AND_OUTLINE,
                 outlineWidth:1,outlineColor:Cesium.Color.BLACK,
                 verticalOrigin:Cesium.VerticalOrigin.BOTTOM,pixelOffset:new Cesium.Cartesian2(0,-14),
                 showBackground:true,backgroundColor:new Cesium.Color(0.05,0.07,0.09,0.8)}
        });
      }
      if(!trails[id]) trails[id]=[];
      trails[id].push(pos);
      if(trails[id].length>80) trails[id]=trails[id].slice(-80);
    });
    document.getElementById('stats3d').innerHTML=
      '<div style="color:#00ffff">ASSETS: '+assets.length+' | ACTIVE: <span style="color:#00ff88">'+ac+'</span></div>';
  }).catch(function(){});
  fetch('/api/threats').then(function(r){return r.json()}).then(function(threats){
    threats.forEach(function(t){
      var id='T-'+t.contact_id;
      var pos=Cesium.Cartesian3.fromDegrees(t.lon,t.lat,20);
      if(entities[id]){entities[id].position=pos;}
      else{
        entities[id]=viewer.entities.add({
          position:pos,
          point:{pixelSize:12,color:Cesium.Color.RED,outlineColor:Cesium.Color.YELLOW,outlineWidth:2},
          label:{text:t.contact_id+'\n'+t.threat_level,font:'10px monospace',
                 fillColor:Cesium.Color.RED,style:Cesium.LabelStyle.FILL_AND_OUTLINE,
                 verticalOrigin:Cesium.VerticalOrigin.BOTTOM,pixelOffset:new Cesium.Cartesian2(0,-14),
                 showBackground:true,backgroundColor:new Cesium.Color(0.3,0,0,0.8)}
        });
      }
    });
  }).catch(function(){});
}
var stored=localStorage.getItem('cesium_token');
if(stored){document.getElementById('token-input').value=stored;initViewer(stored);}
</script>
</body>
</html>
