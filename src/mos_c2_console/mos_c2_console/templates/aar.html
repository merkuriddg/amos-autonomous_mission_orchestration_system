<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOS - After Action Review</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a0a;color:#00ff88}
#header{background:#0d1117;padding:10px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid #ff884444}
#header h1{font-size:16px;letter-spacing:3px}
#header h1 span{color:#ff8844}
.nav-links{display:flex;align-items:center;gap:12px}
.nav-links a{color:#4488ff;text-decoration:none;font-size:11px;border:1px solid #4488ff44;
  padding:4px 12px;border-radius:3px}
.nav-links a:hover{background:#4488ff22}
#status{font-size:10px;color:#888}
#main{display:flex;height:calc(100vh - 48px - 56px)}
#map{flex:1}
#events{width:260px;background:#0d1117;border-left:1px solid #ff884433;overflow-y:auto;padding:10px;font-size:10px}
#events h3{font-size:11px;color:#ff8844;margin-bottom:8px;letter-spacing:2px}
.evt{padding:3px 0;border-bottom:1px solid #111;color:#888}
.evt .etime{color:#555}
.evt.cmd{color:#4488ff}
.evt.threat{color:#ff4444}
.evt.mission{color:#00ff88}
.evt.sust{color:#ffaa00}
#controls{background:#0d1117;padding:10px 20px;display:flex;align-items:center;gap:10px;
  border-top:1px solid #ff884444;height:56px}
#controls button{background:#1a1a2e;color:#ff8844;border:1px solid #ff884444;padding:5px 12px;
  font-family:'Courier New',monospace;font-size:11px;cursor:pointer;border-radius:3px}
#controls button:hover{background:#ff884422}
#timeline{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:#1a1a2e;
  border-radius:3px;outline:none}
#timeline::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#ff8844;
  border-radius:50%;cursor:pointer}
#time-display{font-size:12px;color:#ff8844;min-width:80px;text-align:center}
.spd{min-width:36px;text-align:center}
.spd.active{color:#00ff88;border-color:#00ff8844}
.leaflet-container{background:#0a0a0a !important}
</style>
</head>
<body>
<div id="header">
  <h1>&#x25B6; <span>MOS</span> AFTER ACTION REVIEW</h1>
  <div class="nav-links">
    <span id="status">Loading...</span>
    <a href="/">&#x2190; C2 CONSOLE</a>
    <a href="/dashboard">TWIN</a>
  </div>
</div>
<div id="main">
  <div id="map"></div>
  <div id="events">
    <h3>&#x25B6; EVENT LOG</h3>
    <div id="event-list"></div>
  </div>
</div>
<div id="controls">
  <button id="btn-play" onclick="togglePlay()">&#x25B6; PLAY</button>
  <button class="spd" onclick="setSpeed(1,this)">1x</button>
  <button class="spd" onclick="setSpeed(2,this)">2x</button>
  <button class="spd active" onclick="setSpeed(5,this)">5x</button>
  <button class="spd" onclick="setSpeed(10,this)">10x</button>
  <input type="range" id="timeline" min="0" max="100" value="100">
  <span id="time-display">--:--:--</span>
  <button onclick="loadData()">&#x21BB; REFRESH</button>
</div>
<script>
var map=L.map('map',{center:[27.8497,-82.5212],zoom:14,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'CartoDB',maxZoom:19}).addTo(map);

var DC={AIR:'#4488ff',GROUND:'#44ff44',MARITIME:'#ff8844'};
var SC={0:'#888888',1:'#ffff00',2:'#00ff88',3:'#4488ff'};
var markers={};
var trailLines={};
var snapshots=[];
var events=[];
var playing=false;
var playSpeed=5;
var currentIdx=0;
var playInterval=null;

function makeIcon(domain,status){
  var dc=DC[domain]||'#fff';
  var sc=SC[status]||'#888';
  return L.divIcon({className:'',iconSize:[16,16],iconAnchor:[8,8],
    html:'<div style="width:16px;height:16px;border-radius:50%;border:2px solid '+dc+
    ';background:radial-gradient(circle at center,'+sc+' 30%,transparent 70%);box-shadow:0 0 4px '+dc+'44;"></div>'});
}

function renderSnapshot(idx){
  if(idx<0||idx>=snapshots.length) return;
  var snap=snapshots[idx];
  var assets=snap.assets||[];
  assets.forEach(function(a){
    var id=a.asset_id;
    var ll=[a.lat,a.lon];
    if(markers[id]){
      markers[id].setLatLng(ll);
      markers[id].setIcon(makeIcon(a.asset_type,a.mission_status));
    } else {
      markers[id]=L.marker(ll,{icon:makeIcon(a.asset_type,a.mission_status)})
        .bindTooltip(a.callsign,{permanent:false,direction:'top',offset:[0,-10]})
        .addTo(map);
    }
    if(!trailLines[id]) trailLines[id]=[];
    trailLines[id].push(ll);
    if(trailLines[id].length>120) trailLines[id]=trailLines[id].slice(-120);
  });
  var t=new Date(snap.timestamp*1000);
  document.getElementById('time-display').textContent=
    t.toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('timeline').value=idx;
  var evtHtml='';
  for(var i=events.length-1;i>=0;i--){
    var e=events[i];
    if(e.timestamp<=snap.timestamp){
      var cls='';
      if(e.text.indexOf('CMD')===0) cls='cmd';
      else if(e.text.indexOf('THREAT')===0) cls='threat';
      else if(e.text.indexOf('MISSION')===0) cls='mission';
      else if(e.text.indexOf('SUST')===0) cls='sust';
      evtHtml+='<div class="evt '+cls+'"><span class="etime">'+e.time+'</span> '+e.text+'</div>';
    }
    if(evtHtml.length>5000) break;
  }
  document.getElementById('event-list').innerHTML=evtHtml;
}

function togglePlay(){
  playing=!playing;
  document.getElementById('btn-play').innerHTML=playing?'&#x23F8; PAUSE':'&#x25B6; PLAY';
  if(playing){
    if(currentIdx>=snapshots.length-1) currentIdx=0;
    startInterval();
  } else {
    clearInterval(playInterval);
  }
}

function startInterval(){
  clearInterval(playInterval);
  playInterval=setInterval(function(){
    if(currentIdx<snapshots.length-1){
      currentIdx++;
      renderSnapshot(currentIdx);
    } else {
      playing=false;
      document.getElementById('btn-play').innerHTML='&#x25B6; PLAY';
      clearInterval(playInterval);
    }
  },1000/playSpeed);
}

function setSpeed(s,el){
  playSpeed=s;
  document.querySelectorAll('.spd').forEach(function(b){b.classList.remove('active')});
  if(el) el.classList.add('active');
  if(playing) startInterval();
}

document.getElementById('timeline').addEventListener('input',function(){
  currentIdx=parseInt(this.value);
  renderSnapshot(currentIdx);
});

async function loadData(){
  try{
    var sR=await fetch('/api/aar/snapshots');
    snapshots=await sR.json();
    var eR=await fetch('/api/aar/events');
    events=await eR.json();
    document.getElementById('timeline').max=Math.max(0,snapshots.length-1);
    currentIdx=snapshots.length-1;
    if(currentIdx>=0) renderSnapshot(currentIdx);
    document.getElementById('status').textContent=snapshots.length+' snapshots | '+events.length+' events';
  }catch(e){
    document.getElementById('status').textContent='Error loading data';
  }
}
loadData();
setInterval(function(){if(!playing) loadData();},30000);
</script>
</body>
</html>
