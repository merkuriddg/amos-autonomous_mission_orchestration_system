<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOS - Multi-Echelon C2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a0a;color:#00ff88}
#header{background:#0d1117;padding:10px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid #ff44ff44}
#header h1{font-size:16px;letter-spacing:3px}
#header h1 span{color:#ff44ff}
.nav-links{display:flex;gap:10px;align-items:center}
.nav-links a{color:#4488ff;text-decoration:none;font-size:11px;border:1px solid #4488ff44;
  padding:4px 10px;border-radius:3px}
.nav-links a:hover{background:#4488ff22}
#tabs{display:flex;gap:0;padding:0 20px;background:#0d1117}
.tab{padding:10px 20px;cursor:pointer;font-size:11px;letter-spacing:2px;border-bottom:2px solid transparent;color:#888}
.tab:hover{color:#fff}
.tab.active{color:#ff44ff;border-bottom-color:#ff44ff}
#content{padding:20px}
.echelon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.ecard{background:#0d1117;border:1px solid #333;border-radius:6px;padding:16px}
.ecard h3{font-size:13px;margin-bottom:10px;letter-spacing:2px}
.ecard .val{font-size:28px;font-weight:bold}
.ecard .sub{font-size:10px;color:#888;margin-top:4px}
.erow{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid #111}
.rlabel{color:#888}
.bar-wrap{background:#1a1a2e;height:8px;border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s}
.unit-card{background:#0d1117;border:1px solid #333;border-radius:6px;padding:16px;margin-bottom:12px}
.unit-card h3{color:#ff44ff;font-size:12px;letter-spacing:2px;margin-bottom:8px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.alert-banner{background:#ff444422;border:1px solid #ff4444;padding:8px 16px;border-radius:4px;
  margin-bottom:12px;font-size:11px;color:#ff4444}
</style>
</head>
<body>
<div id="header">
  <h1>&#x2B21; <span>MOS</span> ECHELON VIEW</h1>
  <div class="nav-links">
    <a href="/">C2</a><a href="/ew" style="color:#ff0066">⚡EW</a>
    <a href="/sigint">📡SIGINT</a>
    <a href="/cyber">🔓CYBER</a>
    <a href="/dashboard">TWIN</a><a href="/tactical3d">3D</a><a href="/aar">AAR</a>
  </div>
</div>
<div id="tabs">
  <div class="tab active" onclick="switchTab('hpl',this)">HPL — PLATOON LEADER</div>
  <div class="tab" onclick="switchTab('asc',this)">ASC — SYSTEMS COORDINATOR</div>
  <div class="tab" onclick="switchTab('bn',this)">BN TOC — BATTALION</div>
</div>
<div id="content"></div>
<script>
var currentTab='hpl';
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  if(el) el.classList.add('active');
  refresh();
}
async function refresh(){
  try{
    var aR=await fetch('/api/assets'); var assets=await aR.json();
    var tR=await fetch('/api/threats'); var threats=await tR.json();
    var sR=await fetch('/api/sustainment'); var sust=await sR.json();
    var cR=await fetch('/api/ai/coa'); var coas=await cR.json();
    var auR=await fetch('/api/autonomy'); var aut=await auR.json();
    if(currentTab==='hpl') renderHPL(assets,threats,coas,aut);
    else if(currentTab==='asc') renderASC(assets,sust);
    else renderBN(assets,threats,sust,aut);
  }catch(e){console.warn(e)}
}
function renderHPL(assets,threats,coas,aut){
  var t=assets.length, act=assets.filter(function(a){return a.mission_status>0&&a.mission_status<5}).length;
  var html='<div class="echelon-grid">';
  html+='<div class="ecard"><h3>&#x2B21; PLATOON STATUS</h3><div class="val" style="color:#00ff88">'+act+'/'+t+'</div><div class="sub">ASSETS ACTIVE</div></div>';
  html+='<div class="ecard"><h3>&#x26A0; THREATS</h3><div class="val" style="color:#ff4444">'+threats.length+'</div><div class="sub">ACTIVE CONTACTS</div></div>';
  html+='<div class="ecard"><h3>&#x2699; AUTONOMY</h3><div class="val" style="color:#00ffff">L'+aut.current_level+'</div><div class="sub">'+aut.level_name+'</div></div>';
  html+='<div class="ecard"><h3>&#x1F9E0; AI COAs</h3><div class="val" style="color:#ff44ff">'+coas.length+'</div><div class="sub">RECOMMENDATIONS</div></div>';
  html+='</div>';
  if(coas.length>0){
    html+='<h3 style="margin:20px 0 10px;font-size:12px;letter-spacing:2px;color:#ff44ff">ACTIVE COAs</h3>';
    for(var i=coas.length-1;i>=Math.max(0,coas.length-5);i--){
      var c=coas[i];
      var sc=c.status==='AUTO_EXECUTED'?'#ffaa00':c.status==='PENDING'?'#4488ff':'#888';
      html+='<div class="erow"><span style="color:'+sc+'">'+c.coa_id+' ['+c.type+']</span><span>'+c.description+'</span><span style="color:'+sc+'">'+c.status+'</span></div>';
    }
  }
  if(threats.length>0){
    html+='<h3 style="margin:20px 0 10px;font-size:12px;letter-spacing:2px;color:#ff4444">THREAT CONTACTS</h3>';
    threats.forEach(function(t){
      var tc=t.threat_level==='HIGH'||t.threat_level==='CRITICAL'?'#ff4444':'#ffaa00';
      html+='<div class="erow"><span style="color:'+tc+'">'+t.contact_id+'</span><span>'+t.threat_type+'</span><span style="color:'+tc+'">'+t.threat_level+'</span></div>';
    });
  }
  document.getElementById('content').innerHTML=html;
}
function renderASC(assets,sust){
  var html='';
  var crit=sust.filter(function(s){return s.level==='CRITICAL'});
  var warn=sust.filter(function(s){return s.level==='WARNING'});
  if(crit.length>0) html+='<div class="alert-banner">&#x26A0; '+crit.length+' CRITICAL ASSETS — AUTO RTB IN PROGRESS</div>';
  if(warn.length>0) html+='<div class="alert-banner" style="background:#ffaa0022;border-color:#ffaa00;color:#ffaa00">'+warn.length+' assets below 30% battery</div>';
  var domains={AIR:[],GROUND:[],MARITIME:[]};
  assets.forEach(function(a){if(domains[a.asset_type]) domains[a.asset_type].push(a);});
  ['AIR','GROUND','MARITIME'].forEach(function(dom){
    var da=domains[dom]; if(!da.length) return;
    var dc={AIR:'#4488ff',GROUND:'#44ff44',MARITIME:'#ff8844'}[dom];
    html+='<div class="unit-card"><h3 style="color:'+dc+'">'+dom+' ELEMENT ('+da.length+' assets)</h3>';
    da.forEach(function(a){
      var s=sust.find(function(x){return x.asset_id===a.asset_id})||{};
      var bc=a.battery>50?'#00ff88':a.battery>20?'#ffaa00':'#ff4444';
      var st=['IDLE','EN ROUTE','EXECUTING','COMPLETE'][a.mission_status]||'UNK';
      var stc=['#888','#ffff00','#00ff88','#4488ff'][a.mission_status]||'#888';
      html+='<div class="erow"><span style="color:'+dc+'">'+a.callsign+'</span>';
      html+='<span><span class="status-dot" style="background:'+stc+'"></span>'+st+'</span>';
      html+='<span style="color:'+bc+'">'+a.battery.toFixed(0)+'%</span>';
      html+='<span>'+(s.time_remaining?s.time_remaining.toFixed(0)+'min':'--')+'</span>';
      html+='<span>'+a.comms.toFixed(0)+' dBm</span></div>';
    });
    html+='</div>';
  });
  document.getElementById('content').innerHTML=html;
}
function renderBN(assets,threats,sust,aut){
  var html='<h3 style="margin-bottom:12px;font-size:12px;letter-spacing:2px;color:#ff44ff">BATTALION TACTICAL OVERVIEW</h3>';
  html+='<div class="echelon-grid">';
  var platoons=[
    {name:'ALPHA PLT (MOS)',assets:assets.length,active:assets.filter(function(a){return a.mission_status>0}).length,threats:threats.length,status:'OPERATIONAL'},
    {name:'BRAVO PLT (Simulated)',assets:28,active:12,threats:1,status:'OPERATIONAL'},
    {name:'CHARLIE PLT (Simulated)',assets:32,active:8,threats:0,status:'STAGING'},
  ];
  platoons.forEach(function(p,i){
    var sc=p.status==='OPERATIONAL'?'#00ff88':'#ffaa00';
    var real=i===0;
    html+='<div class="unit-card" style="border-color:'+(real?'#ff44ff44':'#33333366')+'">';
    html+='<h3>'+(real?'&#x2B21; ':'&#x25CB; ')+p.name+'</h3>';
    html+='<div class="erow"><span class="rlabel">STATUS</span><span style="color:'+sc+'">'+p.status+'</span></div>';
    html+='<div class="erow"><span class="rlabel">ASSETS</span><span>'+p.active+'/'+p.assets+' ACTIVE</span></div>';
    html+='<div class="erow"><span class="rlabel">THREATS</span><span style="color:'+(p.threats>0?'#ff4444':'#888')+'">'+p.threats+'</span></div>';
    if(real){
      var avgBatt=assets.length>0?(assets.reduce(function(s,a){return s+a.battery},0)/assets.length).toFixed(0):0;
      html+='<div class="erow"><span class="rlabel">AVG BATT</span><span>'+avgBatt+'%</span></div>';
      html+='<div class="erow"><span class="rlabel">AUTONOMY</span><span style="color:#00ffff">L'+aut.current_level+' '+aut.level_name+'</span></div>';
      var crit=sust.filter(function(s){return s.level==='CRITICAL'||s.level==='WARNING'}).length;
      if(crit>0) html+='<div class="erow"><span class="rlabel">ALERTS</span><span style="color:#ff4444">'+crit+' SUSTAINMENT</span></div>';
    }
    html+='</div>';
  });
  html+='</div>';
  html+='<div class="unit-card" style="margin-top:16px;border-color:#ff44ff44"><h3>BN AGGREGATE</h3>';
  var totAssets=assets.length+28+32, totActive=assets.filter(function(a){return a.mission_status>0}).length+12+8;
  html+='<div class="erow"><span class="rlabel">TOTAL ASSETS</span><span>'+totAssets+'</span></div>';
  html+='<div class="erow"><span class="rlabel">TOTAL ACTIVE</span><span style="color:#00ff88">'+totActive+'</span></div>';
  html+='<div class="erow"><span class="rlabel">TOTAL THREATS</span><span style="color:#ff4444">'+(threats.length+1)+'</span></div>';
  html+='<div class="erow"><span class="rlabel">PLATOONS</span><span>3 NETWORKED</span></div>';
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}
setInterval(refresh,2000);refresh();
</script>
</body>
</html>
